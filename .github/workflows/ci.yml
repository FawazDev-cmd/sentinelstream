name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app tests
      - run: uv run pytest -m "not integration"
      - run: uv run alembic history
      - run: uv run alembic heads
      - name: Require one Alembic head
        run: uv run python -c "from alembic.config import Config; from alembic.script import ScriptDirectory; heads=ScriptDirectory.from_config(Config('alembic.ini')).get_heads(); assert len(heads) == 1, heads"

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sentinelstream_test
          POSTGRES_USER: sentinelstream
          POSTGRES_PASSWORD: sentinelstream_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinelstream -d sentinelstream_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SENTINELSTREAM_DATABASE_URL: postgresql+asyncpg://sentinelstream:sentinelstream_test_password@localhost:5432/sentinelstream_test
      SENTINELSTREAM_TEST_DATABASE_URL: postgresql+asyncpg://sentinelstream:sentinelstream_test_password@localhost:5432/sentinelstream_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run pytest -m integration

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: sentinelstream:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
